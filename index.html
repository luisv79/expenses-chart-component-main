<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Expenses chart component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
 <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main>

    <div class="balance-card">
      <div class="balance-card_title">
        <p>My balance</p>
        <h1>$921.48</h1>
      </div>
      <div class="balance-card_logo">
        <img src="./images/logo.svg" alt="">
      </div>
    </div>
  
    <div class="card">
    <h2>Spending - Last 7 days</h2>
  
    <div class="chart" id="chart"></div>
  
    <hr>
  
    <div class="total">
      <p class="total-title">Total this month</p>
      <div class="total-price">
        <h1>$478.33</h1>
         <div class="total-price_month">
          <p class="total-price_porcent">+2.4%</p>
          <p class="total-price_last-month">from last month</p>
         </div>
      </div>
    </div>
  </div>

  </main>


  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
<script src="/assets/js/scripts.js"></script>
</html>
